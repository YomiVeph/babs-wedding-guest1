<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tara & Tunde – Save The Date</title>

    <!-- Speed: early connection to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preload door + seal images with high priority — ready before first paint -->
    <link
      rel="preload"
      as="image"
      href="image/Left.jpg"
      fetchpriority="high"
      media="(min-width: 601px)"
    />
    <link
      rel="preload"
      as="image"
      href="image/right.jpg"
      fetchpriority="high"
      media="(min-width: 601px)"
    />
    <link
      rel="preload"
      as="image"
      href="image/seal.png"
      fetchpriority="high"
      media="(min-width: 601px)"
    />
    <link
      rel="preload"
      as="image"
      href="image/left-mobile.jpg"
      fetchpriority="high"
      media="(max-width: 600px)"
    />
    <link
      rel="preload"
      as="image"
      href="image/right-mobile.jpg"
      fetchpriority="high"
      media="(max-width: 600px)"
    />
    <link
      rel="preload"
      as="image"
      href="image/seal-mobile.png"
      fetchpriority="high"
      media="(max-width: 600px)"
    />

    <link rel="stylesheet" href="babs.css" />
  </head>
  <body>
    <div class="scene" id="scene">
      <!-- Invitation content revealed behind the doors -->
      <div class="content-card" id="contentCard">
        <div class="invite-content">
          <p class="eyebrow reveal-item" style="--delay: 0.4s">
            You are cordially invited
          </p>
          <h1 class="reveal-item" style="--delay: 0.6s">Save the Date</h1>
          <div class="names reveal-item" style="--delay: 0.9s">
            <img
              class="names-img-desktop"
              src="image/picture-name.jpg"
              alt="Tara and Tunde"
            />
            <img
              class="names-img-mobile"
              src="image/Frame 2121459200.jpg"
              alt="Tara & Tunde"
            />
          </div>
          <!-- <div class="divider reveal-item" style="--delay: 1.2s"></div> -->
          <div class="detail-msg reveal-item" style="--delay: 1.4s">
            kindly join us as we celebrate the beginning of forever
          </div>
          <div class="event-details reveal-item" style="--delay: 1.65s">
            <div class="detail-col">
              <span class="detail-label">SAT</span>
              <span class="detail-label">11:30</span>
            </div>
            <div class="detail-divider-wrap">
              <div class="detail-divider"></div>
            </div>

            <div class="detail-day">04</div>
            <div class="detail-divider-wrap">
              <div class="detail-divider"></div>
            </div>

            <div class="detail-col">
              <span class="detail-label">APRIL</span>
              <span class="detail-label">2026</span>
            </div>
          </div>
          <div class="venue reveal-item" style="--delay: 1.9s">
            DR SPA SALON, FIRST AVENUE HOUSING ESTATE,<br />
            IBARA, ABEOKUTA, OGUN STATE
          </div>
          <div class="action-btns reveal-item" style="--delay: 2.15s">
            <a href="rsvp.html" class="action-btn">
              <span class="material-symbols-outlined">mail</span> RSVP HERE
            </a>
            <a
              href="https://maps.app.goo.gl/g6DvrBetQDDmGw9K6"
              target="_blank"
              class="action-btn"
            >
              <span class="material-symbols-outlined">location_on</span>
              LOCATION
            </a>
          </div>
        </div>
      </div>

      <div class="doors" id="doors">
        <!-- Left door — seal lives here so it slides left with this door -->
        <div class="door left">
          <div class="door-face"></div>
          <div class="seal" id="seal">
            <img
              src="image/seal.png"
              alt="Wax Seal"
              loading="eager"
              decoding="sync"
            />
          </div>
        </div>
        <!-- Right door -->
        <div class="door right">
          <div class="door-face"></div>
        </div>
      </div>
    </div>

    <script src="babs.js" defer></script>
  </body>
</html>
